<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Healthcare Insurance Claim Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <h2>Healthcare Insurance Claim Prediction</h2>

    <form action="/predict" method="post">

        <input type="int" name="age" placeholder="Age">

        <input type="float" name="bmi" placeholder="BMI">

        <input type="int" name="bloodpressure" placeholder="Blood Pressure">

        <input type="int" name="dependents" placeholder="Number of Dependents">

        <h3>Smoker</h3>

        <select name="smoker" id="sel">

            <option value="0">No</option>

            <option value="1">Yes</option>

        </select>

        <h3>Diabetes</h3>

        <select name="diabetes" id="sel">

            <option value="0">No</option>

            <option value="1">Yes</option>

        </select>

        <h3>Regular Exercise</h3>

        <select name="regular_ex" id="sel">

            <option value="0">No</option>

            <option value="1">Yes</option>

        </select>

        <h3>Sex</h3>

        <select name="sex" id="sel">

            <option value="0">Female</option>

            <option value="1">Male</option>

        </select>

        <h3>Hereditary Diseases</h3>

        <select name="hereditary_diseases" id="sel">

            <option value="0">No Disease</option>

            <option value="1">Diabetes</option>

            <option value="2">Cancer</option>

            <option value="3">Heart Disease</option>

            <option value="4">Obesity</option>

            <option value="5">Arthritis</option>

        </select>

        <br><br>

        <button type="submit" id="btn">

            Predict Claim Amount

        </button>

    </form>

    <br>

    {% if prediction_text %}

    <p id="result">{{ prediction_text }}</p>

    {% endif %}

</body>

</html>
